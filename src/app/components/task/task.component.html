<div class="task">

  <div class="task-header">
    <h3>{{ task.title }}</h3>

    <div class="task-actions">
      <button class="action-btn edit-btn" (click)="onEdit()">✎</button>
      <button class="action-btn delete-btn" (click)="onDelete()">🗑</button>
    </div>
  </div>

  <p>{{ task.description }}</p>

  @if(task.image){
  <div>
    <button class="show-image-btn" (click)="toggleImage()">
      📎 {{ showImage ? 'Hide Image' : 'Show Image' }}
    </button>
    @if(showImage){
    <div class="task-image-container">
      <img 
      [src]="task.image" 
      class="task-image"
      (click)="openImageModal();$event.stopPropagation()"
      title="Click to view full image"
      >
    </div>
    }
  </div>
  }

  @if (task.enteredDate) {
  <div class="entered-date">
    ⏱ {{ task.enteredDate | date:'mediumDate' }}
  </div>
  }

  @if (task.dueDate) {
  <div class="due-date">
    📅 {{ task.dueDate | date:'mediumDate' }}
  </div>
  }


  <span [ngClass]="task.priority.toLowerCase()">
    {{ task.priority }}
  </span>



</div>
